<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sky Sketch</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="scene">
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        aria-label="Switch to dark mode"
        title="Toggle light and dark mode"
      >
        <span class="theme-toggle__label" aria-hidden="true">Light</span>
      </button>
      <div id="sketch" class="scene__sketch" aria-hidden="true"></div>
    </main>

    <script src="./js/vendor/p5.min.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
